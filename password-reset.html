<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Reset your BillFlow password</title>
<style>
  :root { --brand:#E95420; --text:#2C001E; --muted:#5E5959;
          --subtle:#8A8581; --border:#EAE4DF; --bg:#FAFAFA;
          --card:#FFFFFF; --danger:#C7162B; --success:#0E8420; }
  * { box-sizing:border-box; }
  body { margin:0; padding:24px; background:var(--bg); color:var(--text);
         font:15px/1.55 -apple-system,'Segoe UI',Ubuntu,Roboto,sans-serif; }
  .card { max-width:460px; margin:0 auto; padding:28px 32px 24px;
          background:var(--card); border-radius:10px;
          box-shadow:0 1px 3px rgba(0,0,0,.06); }
  h2 { color:var(--text); margin:0 0 12px; font-size:22px; font-weight:600; }
  p { color:var(--muted); margin:8px 0; }
  label { display:block; color:var(--text); font-weight:500; font-size:13px;
          margin:14px 0 4px; }
  input[type="password"] { width:100%; padding:10px 12px; font-size:15px;
          border:1px solid var(--border); border-radius:6px;
          background:#FFF; color:var(--text); outline:none; }
  input[type="password"]:focus { border-color:var(--brand);
          box-shadow:0 0 0 3px rgba(233,84,32,.12); }
  .btn { display:block; width:100%; margin-top:18px; padding:11px 22px;
         background:var(--brand); color:#FFFFFF; border:0; border-radius:6px;
         font-weight:600; font-size:15px; cursor:pointer; }
  .btn:disabled { opacity:.55; cursor:default; }
  .brand { letter-spacing:2px; font-weight:700; color:var(--brand); }
  .foot { margin-top:24px; padding-top:14px; border-top:1px solid var(--border);
          font-size:12px; color:var(--subtle); text-align:center; }
  .msg { padding:12px 14px; border-radius:6px; font-size:14px; margin:14px 0; }
  .msg.err { background:#FDEDEF; color:var(--danger); border:1px solid #F4C0C7; }
  .msg.ok  { background:#E7F5E9; color:var(--success); border:1px solid #B7E1BE; }
  .hint { color:var(--subtle); font-size:12px; margin-top:6px; }
</style>
</head>
<body>
<div class="card">
  <h2>Set a new password</h2>
  <p id="lead">Enter and confirm a new password for your BillFlow account.</p>

  <div id="init"  class="msg" style="display:none">Verifying reset link…</div>
  <div id="err"   class="msg err" style="display:none"></div>
  <div id="okmsg" class="msg ok"  style="display:none">
    ✓ Password updated. Open BillFlow and sign in with your new password.
  </div>

  <form id="form" style="display:none" autocomplete="off">
    <label for="pw1">New password</label>
    <input id="pw1" type="password" minlength="6" required />
    <div class="hint">At least 6 characters.</div>

    <label for="pw2">Confirm new password</label>
    <input id="pw2" type="password" minlength="6" required />

    <button id="submit" class="btn" type="submit">Set new password</button>
  </form>

  <div class="foot">
    BillFlow — developed by <span class="brand">SDX STUDIO</span><br/>
    Contact: <a href="mailto:rahilwani8090@gmail.com">rahilwani8090@gmail.com</a>
  </div>
</div>

<script>
(function () {
  // Public config — publishable key is designed to be embedded in
  // client-side code. Row Level Security and the JWT scoping enforce
  // access; the key alone can't read another user's data.
  const SUPABASE_URL = "https://kkjtvnkrbfckmbjlsjyy.supabase.co";
  const ANON_KEY = "sb_publishable_uzUKiMg-s6rHLACdQJDDgw_5yYo_mn8";

  const $ = function (id) { return document.getElementById(id); };
  const show = function (id, text) {
    var el = $(id);
    if (text !== undefined) el.textContent = text;
    el.style.display = "block";
  };
  const hide = function (id) { $(id).style.display = "none"; };

  // Supabase's password-recovery flow lands users here with an
  // #access_token=...&type=recovery URL fragment. Parse both `hash`
  // and `search` in case the flow changes to PKCE query params later.
  var raw = (location.hash || "").replace(/^#/, "");
  if (!raw) raw = (location.search || "").replace(/^\?/, "");
  var params = new URLSearchParams(raw);
  var accessToken = params.get("access_token");
  var type = params.get("type");
  var errParam = params.get("error_description") || params.get("error");

  if (errParam) {
    show("err", "Reset link is not valid: " + errParam
              + ". Open BillFlow and request a new one.");
    return;
  }
  if (!accessToken || type !== "recovery") {
    show("err",
      "This page needs to be opened from the password-reset link in your email. "
      + "Open BillFlow, tap “Forgot password”, and use the fresh link we send.");
    return;
  }

  // Token present — reveal the form.
  $("form").style.display = "block";

  $("form").addEventListener("submit", async function (e) {
    e.preventDefault();
    hide("err");
    var p1 = $("pw1").value, p2 = $("pw2").value;
    if (p1.length < 6) { show("err", "Password must be at least 6 characters."); return; }
    if (p1 !== p2)     { show("err", "Passwords don't match."); return; }

    var btn = $("submit");
    btn.disabled = true; btn.textContent = "Saving…";

    try {
      var res = await fetch(SUPABASE_URL + "/auth/v1/user", {
        method: "PUT",
        headers: {
          "apikey": ANON_KEY,
          "Authorization": "Bearer " + accessToken,
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ password: p1 })
      });
      if (!res.ok) {
        var body = "";
        try { body = (await res.json()).msg || ""; } catch (_) {}
        throw new Error(body || ("HTTP " + res.status));
      }
      hide("form");
      hide("lead");
      show("okmsg");
    } catch (err) {
      show("err", "Couldn't update password. The link may have expired — "
                + "request a fresh one from BillFlow.");
      btn.disabled = false; btn.textContent = "Set new password";
      console.error(err);
    }
  });
})();
</script>
</body>
</html>

<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Reset your BillFlow password</title>
<style>
  body { margin:0; padding:24px; background:#FAFAFA;
         font:15px/1.55 -apple-system,Segoe UI,Ubuntu,Roboto,sans-serif;
         color:#2C001E; }
  .card { max-width:520px; margin:0 auto; padding:32px; background:#FFFFFF;
          border-radius:8px; box-shadow:0 1px 2px rgba(0,0,0,.05); }
  h2 { color:#2C001E; margin:0 0 12px; font-size:22px; }
  p { color:#5E5959; margin:10px 0; }
  .btn { display:inline-block; margin:18px 0 8px; padding:12px 24px;
         background:#E95420; color:#FFFFFF; text-decoration:none;
         border-radius:6px; font-weight:600; }
  .foot { margin-top:28px; padding-top:14px; border-top:1px solid #EAE4DF;
          font-size:12px; color:#8A8581; text-align:center; }
  .brand { letter-spacing:2px; font-weight:700; color:#E95420; }
  a { color:#E95420; }
</style>
</head>
<body>
<div class="card">
  <h2>Reset your password</h2>

  <p>We received a request to reset your password. Follow the link below
  to choose a new one.</p>

  <p><a class="btn" href="{{ .ConfirmationURL }}">Reset password</a></p>

  <p>If you didn't request this, you can safely ignore this email.</p>

  <div class="foot">
    BillFlow — developed by <span class="brand">SDX STUDIO</span><br/>
    Contact: <a href="mailto:rahilwani8090@gmail.com">rahilwani8090@gmail.com</a>
  </div>
</div>
</body>
</html>
